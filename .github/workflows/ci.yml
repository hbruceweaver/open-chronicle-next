name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: Rust quality
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Reject forbidden runtime dependencies and evidence
        run: ./scripts/check-forbidden-runtime.sh
      - name: Prove the runtime guard rejects a seeded violation
        run: ./scripts/check-forbidden-runtime.sh --self-test
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-targets --locked

  rust-apple-targets:
    name: Rust target (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Check workspace target
        run: cargo check --workspace --all-targets --locked --target "${{ matrix.target }}"

  # U6 adds the required Xcode build/test job with the real macOS application.

