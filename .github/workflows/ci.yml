name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: Rust quality
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Reject forbidden runtime dependencies and evidence
        run: ./scripts/check-forbidden-runtime.sh
      - name: Prove the runtime guard rejects a seeded violation
        run: ./scripts/check-forbidden-runtime.sh --self-test
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-targets --locked

  rust-apple-targets:
    name: Rust target (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Check workspace target
        run: cargo check --workspace --all-targets --locked --target "${{ matrix.target }}"

  macos-application:
    name: macOS application and Rust bridge
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal-ffi
      - name: Build universal Rust core
        run: ./scripts/build-rust-universal.sh
      - name: Reject broad or legacy screenshot APIs
        run: |
          ./scripts/check-capture-apis.sh --self-test
          ./scripts/check-capture-apis.sh
      - name: Verify universal architectures
        run: |
          archs=$(lipo -archs build/universal/libchronicle_ffi.a)
          case " $archs " in *" arm64 "*) ;; *) echo "missing arm64: $archs" >&2; exit 1 ;; esac
          case " $archs " in *" x86_64 "*) ;; *) echo "missing x86_64: $archs" >&2; exit 1 ;; esac
      - name: Test native macOS application
        run: |
          xcodebuild -project macos/OpenChronicle.xcodeproj \
            -scheme OpenChronicle \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO test
